<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cmail Dashboard</title>
    <!-- 🔤 Imports the clean Open Sans typography engine natively -->
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        /* Pristine Custom Material Design Theme using Open Sans */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Open Sans', Arial, sans-serif; }
        body { background-color: #f6f8fc; color: #1f1f1f; display: flex; flex-direction: column; height: 100vh; width: 100vw; overflow: hidden; }

        /* TOP HEADER BAR */
        .gmail-header { height: 64px; background-color: #f6f8fc; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; border-bottom: 1px solid transparent; }
        .header-left { display: flex; align-items: center; gap: 12px; min-width: 238px; }
        .menu-icon { font-size: 20px; color: #5f6368; cursor: pointer; padding: 8px; border-radius: 50%; text-decoration: none; }
        .menu-icon:hover { background-color: #e8eaed; }
        
        /* 🎨 Custom CM / Cmail Branding Badge */
        .brand-node { display: flex; align-items: center; gap: 8px; }
        .brand-logo-badge { background-color: #1a73e8; color: #ffffff; padding: 4px 8px; border-radius: 6px; font-weight: 700; font-size: 16px; letter-spacing: 0.5px; }
        .brand-text-label { font-size: 22px; font-weight: 600; color: #1f1f1f; }

        /* SEARCH BAR */
        .search-container { flex: 1; max-width: 720px; position: relative; }
        .search-bar { width: 100%; height: 48px; background-color: #eaf1fb; border: none; border-radius: 24px; padding: 0 24px 0 50px; font-size: 16px; color: #3c4043; outline: none; transition: background-color 0.1s, box-shadow 0.1s; }
        .search-bar:focus { background-color: #ffffff; box-shadow: 0 1px 1px 0 rgba(65,69,73,0.3), 0 1px 3px 1px rgba(65,69,73,0.15); }
        .search-icon-placeholder { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: #5f6368; font-size: 18px; pointer-events: none; }

        .header-right { display: flex; align-items: center; gap: 12px; min-width: 100px; justify-content: flex-end; }
        .user-avatar-chip { width: 32px; height: 32px; background-color: #1a73e8; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; cursor: pointer; }

        /* CORE CONTAINER */
        .app-body { display: flex; flex: 1; height: calc(100vh - 64px); overflow: hidden; }

        /* SIDEBAR FOLDERS */
        .navigation-sidebar { width: 256px; background-color: #f6f8fc; padding-right: 16px; display: flex; flex-direction: column; gap: 4px; }
        .compose-action-pill { display: flex; align-items: center; gap: 12px; background-color: #c2e7ff; color: #001d35; border: none; padding: 16px 24px; border-radius: 16px; font-size: 14px; font-weight: 600; cursor: pointer; margin: 8px 0 16px 16px; width: fit-content; transition: box-shadow 0.1s; }
        .compose-action-pill:hover { box-shadow: 0 1px 3px 0 rgba(60,64,67,0.3), 0 4px 8px 3px rgba(60,64,67,0.15); background-color: #b3dbf2; }

        .folder-item-row { height: 32px; display: flex; align-items: center; justify-content: space-between; padding: 0 12px 0 26px; border-radius: 0 16px 16px 0; font-size: 14px; color: #444746; cursor: pointer; font-weight: 500; }
        .folder-item-row:hover { background-color: #e1e3e1; color: #1f1f1f; }
        .folder-item-row.active { background-color: #d3e3fd; color: #041e49; font-weight: 600; }
        .folder-badge-count { font-size: 12px; }

        /* CONTENT PANEL WIDGETS */
        .content-workspace { flex: 1; background-color: #ffffff; border-radius: 16px 0 0 0; display: flex; height: 100%; border: 1px solid #e0e0e0; border-bottom: none; border-right: none; overflow: hidden; }

        /* EMAIL MESSAGES FEED */
        .email-stream-list { width: 45%; border-right: 1px solid #e0e0e0; display: flex; flex-direction: column; height: 100%; overflow-y: auto; background-color: #ffffff; }
        .email-row-widget { display: flex; flex-direction: column; padding: 14px 20px; border-bottom: 1px solid #f1f3f4; cursor: pointer; position: relative; transition: box-shadow 0.1s; }
        .email-row-widget:hover { box-shadow: inset 1px 0 0 #dadce0, inset -1px 0 0 #dadce0, 0 1px 2px 0 rgba(60,64,67,0.3), 0 1px 3px 1px rgba(60,64,67,0.15); z-index: 5; }
        .email-row-widget.active { background-color: #f2f6fc; border-left: 4px solid #0b57d0; padding-left: 16px; }
        
        .row-meta-sender { font-size: 14px; font-weight: 700; color: #1f1f1f; margin-bottom: 2px; }
        .row-meta-subject { font-size: 13px; color: #1f1f1f; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .row-meta-snippet { font-size: 12px; color: #5f6368; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-top: 2px; }

        /* DISPATCHER PANES READER */
        .message-reading-pane { flex: 1; display: flex; flex-direction: column; background-color: #ffffff; height: 100%; overflow-y: auto; padding: 24px; }
        .pane-header-subject { font-size: 22px; font-weight: 400; color: #1f1f1f; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .pane-meta-sender { font-size: 14px; color: #5f6368; margin-bottom: 24px; border-bottom: 1px solid #f1f3f4; padding-bottom: 16px; }
        .pane-body-context { font-size: 14px; line-height: 1.6; color: #1f1f1f; white-space: pre-wrap; }

        /* COMPOSE MODAL PANEL SHEET */
        .compose-window-modal { display: none; padding: 30px; height: 100%; width: 55%; flex-direction: column; background: #ffffff; border-left: 1px solid #e0e0e0; }
        .compose-header-label { font-size: 16px; font-weight: 600; color: #1f1f1f; margin-bottom: 20px; }
        .compose-input-field { width: 100%; padding: 12px 16px; background-color: #ffffff; border: 1px solid #747775; border-radius: 4px; color: #1f1f1f; outline: none; font-size: 14px; margin-bottom: 16px; font-family: inherit; }
        .compose-input-field:focus { border: 2px solid #0b57d0; padding: 11px 15px; }

        .pill-submit-btn { background-color: #0b57d0; color: #ffffff; border: none; padding: 10px 24px; border-radius: 100px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.1s; width: fit-content; }
        .pill-submit-btn:hover { background-color: #0842a0; box-shadow: 0 1px 2px 0 rgba(60,64,67,0.3), 0 1px 3px 1px rgba(60,64,67,0.15); }
        .flat-cancel-btn { background: none; border: none; color: #5f6368; font-size: 14px; font-weight: 600; cursor: pointer; padding: 10px 16px; border-radius: 100px; }
        .flat-cancel-btn:hover { background-color: #f1f3f4; }
    </style>
</head>
<body>

    <header class="gmail-header">
        <div class="header-left">
            <a href="dashboard.html" class="menu-icon" title="Return to Dashboard">◀</a>
            <div class="brand-node">
                <div class="brand-logo-badge">CM</div>
                <span class="brand-text-label">Cmail</span>
            </div>
        </div>
        <div class="search-container">
            <span class="search-icon-placeholder">🔍</span>
            <input type="text" class="search-bar" placeholder="Search mail">
        </div>
        <div class="header-right">
            <div id="userBadgeIcon" class="user-avatar-chip">J</div>
        </div>
    </header>

    <div class="app-body">
        <nav class="navigation-sidebar">
            <button class="compose-action-pill" onclick="openComposeFormView()">✏️ Compose</button>
            <div id="f-inbox" class="folder-item-row active" onclick="switchActiveFolder('inbox')">
                <span>Inbox</span> <span id="inboxBadge" class="folder-badge-count">2</span>
            </div>
            <div id="f-sent" class="folder-item-row" onclick="switchActiveFolder('sent')"><span>Sent</span></div>
            <div id="f-spam" class="folder-item-row" onclick="switchActiveFolder('spam')">
                <span>Spam</span> <span id="spamBadge" class="folder-badge-count">1</span>
            </div>
        </nav>

        <main class="content-workspace">
            <div id="emailListContainer" class="email-stream-list"></div>
            <div id="readingWorkspacePane" class="message-reading-pane" style="display: flex;">
                <div class="pane-header-subject">
                    <h2 id="txtSubject">Select a message parameters thread</h2>
                    <button onclick="deleteCurrentEmail()" style="background:none; border:none; cursor:pointer; font-size:16px;">🗑️</button>
                </div>
                <div id="txtSender" class="pane-meta-sender">From: system</div>
                <div id="txtBody" class="pane-body-context">Click an email inside the side row stream list to review contents logs variables.</div>
            </div>

            <div id="composeWorkspacePane" class="compose-window-modal">
                <div class="compose-header-label">New Message</div>
                <input type="text" id="formTo" class="compose-input-field" placeholder="Recipients">
                <input type="text" id="formSubject" class="compose-input-field" placeholder="Subject">
                <textarea id="formBody" class="compose-input-field" placeholder="Type email message body properties here..." style="flex:1; resize:none; padding:15px;"></textarea>
                <div style="display: flex; gap: 8px; margin-top: 10px;">
                    <button class="pill-submit-btn" onclick="emitCompiledMail()">Send</button>
                    <button class="flat-cancel-btn" onclick="closeComposeFormView()">Cancel</button>
                </div>
            </div>
        </main>
    </div>
    <!-- CORE OPERATIONS LOGIC ENGINE SCALING -->
    <script>
        let currentFolderScope = "inbox";
        let activeMailId = 1;

        let mailDatabase = {
            inbox: [
                { id: 1, sender: "assistant@coba-re.com", subject: "Cmail Infrastructure Active", body: "Hello User,\n\nYour centralized digital identity configuration token is successfully linked with your multi-language repository framework.\n\nAll 20 backend module compilation pipelines are executing with zero runtime errors using the clean Open Sans typography engine.\n\nBest regards,\nCmail Automation Node Core" },
                { id: 2, sender: "security@coba-auth.net", subject: "Local Storage Database Synced", body: "System Confirmation Alert:\nYour credential files have been securely isolated inside the enclave data layer strings matrix check values." }
            ],
            sent: [],
            spam: [
                { id: 3, sender: "win-prizes@spam-links.biz", subject: "!!! EARN UNLIMITED REWARDS OR ROBUX !!!", body: "CLICK THIS LINK IMMEDIATELY TO HARVEST GEMS INSTANTLY WITH NO LOGIN AT ALL!!!" }
            ]
        };

        document.addEventListener("DOMContentLoaded", () => {
            let user = localStorage.getItem("cobaActiveUser") || "Jacob";
            document.getElementById("userBadgeIcon").innerText = user.charAt(0).toUpperCase();
            renderEmailStreamGrid();
        });

        function switchActiveFolder(folderName) {
            currentFolderScope = folderName;
            document.querySelectorAll('.folder-item-row').forEach(el => el.classList.remove('active'));
            
            if(folderName === 'inbox') document.getElementById("f-inbox").classList.add("active");
            if(folderName === 'sent') document.getElementById("f-sent").classList.add("active");
            if(folderName === 'spam') document.getElementById("f-spam").classList.add("active");

            closeComposeFormView();
            renderEmailStreamGrid();
        }

        function renderEmailStreamGrid() {
            let container = document.getElementById("emailListContainer");
            container.innerHTML = "";
            let emailList = mailDatabase[currentFolderScope] || [];

            emailList.forEach(mail => {
                let div = document.createElement("div");
                div.className = "email-row-widget" + (mail.id === activeMailId ? " active" : "");
                div.onclick = () => loadTargetMessageContext(mail.id);
                
                let bodySnippet = mail.body.substring(0, 45) + "...";
                div.innerHTML = `
                    <div class="row-meta-sender">${mail.sender}</div>
                    <div class="row-meta-subject">${mail.subject}</div>
                    <div class="row-meta-snippet">${bodySnippet}</div>
                `;
                container.appendChild(div);
            });

            document.getElementById("inboxBadge").innerText = mailDatabase.inbox.length;
            document.getElementById("spamBadge").innerText = mailDatabase.spam.length;

            if(emailList.length > 0) {
                loadTargetMessageContext(emailList.id);
            } else {
                document.getElementById("txtSubject").innerText = "No Conversations";
                document.getElementById("txtSender").innerText = "";
                document.getElementById("txtBody").innerText = "This folder category segment contains no structural message items data matrices.";
            }
        }

        function loadTargetMessageContext(id) {
            activeMailId = id;
            let mail = mailDatabase[currentFolderScope].find(m => m.id === id);
            if(!mail) return;

            document.querySelectorAll('.email-row-widget').forEach(el => el.classList.remove('active'));
            renderEmailStreamGrid();

            document.getElementById("txtSubject").innerText = mail.subject;
            document.getElementById("txtSender").innerText = (currentFolderScope === "sent" ? "To: " : "From: ") + mail.sender;
            document.getElementById("txtBody").innerText = mail.body;
        }

        function openComposeFormView() {
            document.getElementById("readingWorkspacePane").style.display = "none";
            document.getElementById("composeWorkspacePane").style.display = "flex";
        }

        function closeComposeFormView() {
            document.getElementById("composeWorkspacePane").style.display = "none";
            document.getElementById("readingWorkspacePane").style.display = "flex";
        }

        function emitCompiledMail() {
            let to = document.getElementById("formTo").value.trim();
            let sub = document.getElementById("formSubject").value.trim();
            let body = document.getElementById("formBody").value.trim();
            if(!to || !sub) return;

            mailDatabase.sent.unshift({ id: Date.now(), sender: to, subject: sub, body: body });
            
            document.getElementById("formTo").value = "";
            document.getElementById("formSubject").value = "";
            document.getElementById("formBody").value = "";
            
            switchActiveFolder('sent');
        }

        function deleteCurrentEmail() {
            let index = mailDatabase[currentFolderScope].findIndex(m => m.id === activeMailId);
            if(index !== -1) {
                mailDatabase[currentFolderScope].splice(index, 1);
                alert("Message dropped successfully from active directories!");
                renderEmailStreamGrid();
            }
        }
    </script>
</body>
</html>
